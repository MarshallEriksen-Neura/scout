version: "3.8"

services:
  scout:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: deeting-scout
    ports:
      - "8001:8001"
    environment:
      - ENVIRONMENT=production
      - SCOUT_WORKERS=4
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
